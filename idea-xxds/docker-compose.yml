version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: linalg-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: linear_algebra
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  neo4j:
    image: neo4j:5-community
    container_name: linalg-neo4j
    environment:
      NEO4J_AUTH: neo4j/12345678
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  redis:
    image: redis:7-alpine
    container_name: linalg-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  neo4j-data: